<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: #f0f0f0; stroke: #333; stroke-width: 2px; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; text-anchor: middle; }
    .field { font-family: Arial, sans-serif; font-size: 12px; fill: #555; text-anchor: start; }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #222; }
    .arrow { fill: none; stroke: #333; stroke-width: 2px; marker-end: url(#arrowhead); }
    .field-name { font-weight: bold; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
 
  <!-- Title -->
  <text x="400" y="30" class="title">MFC1 File Format Structure</text>
 
  <!-- File Header -->
  <rect x="50" y="60" width="700" height="90" class="box" />
  <text x="400" y="85" class="label">File Header (62 bytes)</text>
 
  <!-- File Header Fields -->
  <text x="70" y="110" class="field-name">magic:</text>
  <text x="150" y="110" class="field">4 bytes (fixed: "MFC1")</text>
 
  <text x="70" y="130" class="field-name">version:</text>
  <text x="150" y="130" class="field">1 byte (uint8)</text>
 
  <text x="70" y="150" class="field-name">block_size:</text>
  <text x="150" y="150" class="field">4 bytes (uint32)</text>
 
  <text x="350" y="110" class="field-name">block_count:</text>
  <text x="430" y="110" class="field">4 bytes (uint32)</text>
 
  <text x="350" y="130" class="field-name">original_size:</text>
  <text x="430" y="130" class="field">8 bytes (uint64)</text>
 
  <text x="350" y="150" class="field-name">sha256:</text>
  <text x="430" y="150" class="field">32 bytes</text>
 
  <!-- Arrow to Block Records -->
  <line x1="400" y1="150" x2="400" y2="180" class="arrow" />
 
  <!-- Block Records -->
  <text x="400" y="200" class="label">Block Records (variable)</text>
 
  <!-- First Block -->
  <rect x="50" y="210" width="700" height="80" class="box" />
  <text x="400" y="235" class="label">Block Record 1</text>
 
  <text x="70" y="260" class="field-name">opcode:</text>
  <text x="150" y="260" class="field">1 byte (uint8)</text>
 
  <text x="70" y="280" class="field-name">original_size:</text>
  <text x="150" y="280" class="field">4 bytes (uint32)</text>
 
  <text x="70" y="300" class="field-name">payload_size:</text>
  <text x="150" y="300" class="field">4 bytes (uint32)</text>
 
  <text x="250" y="260" class="field-name">payload:</text>
  <text x="330" y="260" class="field">variable bytes</text>
 
  <!-- Arrow indicating repetition -->
  <line x1="400" y1="300" x2="400" y2="330" class="arrow" />
 
  <!-- Indication of more blocks -->
  <text x="400" y="350" class="label">...</text>
</svg>