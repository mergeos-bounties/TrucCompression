<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" style="max-width:900px;font-family:monospace">
  <rect width="900" height="500" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" fill="#58a6ff" font-size="18" font-weight="bold" text-anchor="middle">MFC1 Container Layout</text>
  <text x="450" y="55" fill="#8b949e" font-size="12" text-anchor="middle">TrucCompression �� Math Formula Codec</text>

  <!-- File Header -->
  <rect x="50" y="80" width="800" height="80" fill="#161b22" stroke="#30363d" rx="8"/>
  <text x="60" y="100" fill="#f0883e" font-size="11" font-weight="bold">FILE HEADER (FILE_HEADER = <4sBIIQ32s> = 49 bytes)</text>
  <rect x="60" y="108" width="80" height="40" fill="#1f6feb" opacity="0.3" rx="4"/>
  <text x="100" y="132" fill="#79c0ff" font-size="10" text-anchor="middle">MAGIC</text>
  <text x="100" y="145" fill="#8b949e" font-size="8" text-anchor="middle">4s</text>
  <rect x="148" y="108" width="60" height="40" fill="#238636" opacity="0.3" rx="4"/>
  <text x="178" y="132" fill="#7ee787" font-size="10" text-anchor="middle">VERSION</text>
  <text x="178" y="145" fill="#8b949e" font-size="8" text-anchor="middle">B (1)</text>
  <rect x="216" y="108" width="80" height="40" fill="#a371f7" opacity="0.3" rx="4"/>
  <text x="256" y="132" fill="#d2a8ff" font-size="10" text-anchor="middle">BLK_SIZE</text>
  <text x="256" y="145" fill="#8b949e" font-size="8" text-anchor="middle">I (4)</text>
  <rect x="304" y="108" width="80" height="40" fill="#f0883e" opacity="0.3" rx="4"/>
  <text x="344" y="132" fill="#ffa657" font-size="10" text-anchor="middle">BLK_COUNT</text>
  <text x="344" y="145" fill="#8b949e" font-size="8" text-anchor="middle">I (4)</text>
  <rect x="392" y="108" width="100" height="40" fill="#db61a2" opacity="0.3" rx="4"/>
  <text x="442" y="132" fill="#ff7b72" font-size="10" text-anchor="middle">ORIG_SIZE</text>
  <text x="442" y="145" fill="#8b949e" font-size="8" text-anchor="middle">Q (8)</text>
  <rect x="500" y="108" width="180" height="40" fill="#f85149" opacity="0.2" rx="4"/>
  <text x="590" y="132" fill="#ffa198" font-size="10" text-anchor="middle">SHA256</text>
  <text x="590" y="145" fill="#8b949e" font-size="8" text-anchor="middle">32s (32 bytes)</text>

  <!-- Block Records -->
  <text x="60" y="195" fill="#f0883e" font-size="11" font-weight="bold">BLOCK RECORDS (repeated BLK_COUNT times)</text>

  <rect x="50" y="205" width="800" height="50" fill="#161b22" stroke="#30363d" rx="6"/>
  <text x="60" y="222" fill="#58a6ff" font-size="9">Block 0</text>
  <rect x="60" y="228" width="60" height="22" fill="#1f6feb" opacity="0.3" rx="3"/>
  <text x="90" y="243" fill="#79c0ff" font-size="8" text-anchor="middle">opcode (B)</text>
  <rect x="128" y="228" width="80" height="22" fill="#db61a2" opacity="0.3" rx="3"/>
  <text x="168" y="243" fill="#ff7b72" font-size="8" text-anchor="middle">orig_size (I)</text>
  <rect x="216" y="228" width="80" height="22" fill="#f0883e" opacity="0.3" rx="3"/>
  <text x="256" y="243" fill="#ffa657" font-size="8" text-anchor="middle">payload_sz (I)</text>
  <rect x="304" y="228" width="200" height="22" fill="#238636" opacity="0.2" rx="3"/>
  <text x="404" y="243" fill="#7ee787" font-size="8" text-anchor="middle">payload (variable length)</text>

  <rect x="50" y="265" width="800" height="50" fill="#161b22" stroke="#30363d" rx="6"/>
  <text x="60" y="282" fill="#58a6ff" font-size="9">Block 1</text>
  <rect x="60" y="288" width="60" height="22" fill="#1f6feb" opacity="0.3" rx="3"/>
  <text x="90" y="303" fill="#79c0ff" font-size="8" text-anchor="middle">opcode (B)</text>
  <rect x="128" y="288" width="80" height="22" fill="#db61a2" opacity="0.3" rx="3"/>
  <text x="168" y="303" fill="#ff7b72" font-size="8" text-anchor="middle">orig_size (I)</text>
  <rect x="216" y="288" width="80" height="22" fill="#f0883e" opacity="0.3" rx="3"/>
  <text x="256" y="303" fill="#ffa657" font-size="8" text-anchor="middle">payload_sz (I)</text>
  <rect x="304" y="288" width="200" height="22" fill="#238636" opacity="0.2" rx="3"/>
  <text x="404" y="303" fill="#7ee787" font-size="8" text-anchor="middle">payload (variable length)</text>

  <text x="450" y="340" fill="#8b949e" font-size="14" text-anchor="middle">. . .</text>

  <!-- Opcode Legend -->
  <text x="60" y="375" fill="#f0883e" font-size="11" font-weight="bold">OPCODE TABLE</text>
  <g font-size="9" fill="#c9d1d9">
    <text x="60" y="395">0=RAW  1=CONST  2=REPEAT  3=COPY_PREV  4=ZLIB</text>
    <text x="60" y="410">5=BZ2  6=LZMA  7=DELTA_ZLIB  8=XOR_ZLIB</text>
  </g>

  <!-- Sizes -->
  <text x="60" y="440" fill="#8b949e" font-size="10">BLOCK_HEADER = <BII> = 9 bytes per block</text>
  <text x="60" y="455" fill="#8b949e" font-size="10">FILE_HEADER = <4sBIIQ32s> = 49 bytes</text>
  <text x="60" y="475" fill="#58a6ff" font-size="9">Field sizes derived from struct definitions in codec.py</text>
</svg>